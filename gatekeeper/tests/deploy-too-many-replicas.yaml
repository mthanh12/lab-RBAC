apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-too-many-replicas
  namespace: demo
spec:
  replicas: 6
  selector:
    matchLabels:
      app: bad-too-many-replicas
  template:
    metadata:
      labels:
        app: bad-too-many-replicas
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.3
        securityContext:
          runAsUser: 1000
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
